name: Update Tournament Data

on:
  schedule:
    # Every 3 minutes during tournament hours
    - cron: '*/3 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check if tournament is active
        id: check-date
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          # Tournament: April 4-6, 2026 (extend by 1 day for safety)
          if [[ "$TODAY" < "2026-04-04" || "$TODAY" > "2026-04-07" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Outside tournament dates, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check-date.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Fetch schedule data
        if: steps.check-date.outputs.skip != 'true'
        run: |
          curl -sL 'https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrTW6rX1zzFe4P5-JajuVPCw9Cm_S_aTN53pCY5CDMiIrTvwa5rT4BizToJ2EYfP-Bgdtcd8qU8njoLb09y939BFJurflo5LybTdLHGpXOI_kuM_ZxoNh08eZcRl0iCItcUKuM91-r2ea45NROd4yBYSC-wSnOYQY_IMCQ8zXzYyn3f1LXtYOj_6-UzdzFrWLDgtd5p2BffsVKYcM0WN-b7gwokYJiLdFYV_SPiTmobUvkHSkSOxmR6f9riErWYeJNF7pm8ZEy-_Bn-sICbeJ0NOvuzxFqsKBlxDtwTJ7UY7reKb6Hnwdq7I63nBJA&lib=MEoXfsZS0V3rHY2Z_S8VN8jTDv19RCRyF' -o public/data/schedule.json

      - name: Fetch pools data
        if: steps.check-date.outputs.skip != 'true'
        run: |
          curl -sL 'https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrQdVQ0emQ4m2f7AU6s3fSWWZLoEPapOkuAPFkDA6flCwvAaUxQb_aSlAzwViPTK3jiY0irQqIzM78B-DVt50s5Mh0FUt66q1UxbX5t8hzrpU3S7X9ByUHlp_g0fwwI3bKoe_nlxxUfBNcGYOUgML2b6SGYq-EPCVNPyd96EPZQKJ2vFHkFuP7LKDqrU4FxtHMUDy7dUQkMQR9oYeMF8VVKOTjX-GThPDcm3eLV5u8O2dxIQ8XXJ2N4fvyo3SQEML5tbOEq1zOf9iv_OcPb_fZI0BiQvqxBf5aH6AkFhS-RlLFqC5zk&lib=MEoXfsZS0V3rHY2Z_S8VN8jTDv19RCRyF' -o public/data/pools.json

      - name: Commit and push if changed
        if: steps.check-date.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if ! git diff --cached --quiet; then
            git commit -m "Update tournament data $(date -u +%H:%M)"
            git push
          else
            echo "No data changes"
          fi
